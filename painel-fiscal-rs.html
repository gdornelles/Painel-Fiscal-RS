<title>Painel Fiscal RS — SEFAZ-RS 2019–2025</title>

<style>
:root {
  --bg: #0d0d0d;
  --surface: #1c1c1c;
  --header: #141414;
  --border: #2e2e2e;
  --green: #3a9e3a;
  --yellow: #e8c42a;
  --red: #d42b2b;
  --blue: #2490d4;
  --text: #e8e8e8;
  --muted: #888888;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px}
/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity .6s ease,transform .6s ease}
#splash.hidden{opacity:0;transform:scale(.96);pointer-events:none}
.splash-title{font-size:clamp(2rem,5vw,4rem);font-weight:700;background:linear-gradient(90deg,#3a9e3a 0%,#e8c42a 50%,#d42b2b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1.1}
.splash-sub{color:var(--muted);font-size:1rem;letter-spacing:.08em;text-align:center}
.splash-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.splash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:160px}
.splash-card .sc-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.splash-card .sc-value{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:600}
.splash-btn{background:var(--green);color:#fff;border:none;padding:14px 36px;border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .2s;letter-spacing:.04em}
.splash-btn:hover{background:#2d8a2d;transform:translateY(-2px)}
/* MAIN APP */
#app{display:none;flex-direction:column;min-height:100vh}
#app.visible{display:flex}
/* HEADER */
header{background:var(--header);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;min-height:64px}
.hdr-left{flex:1;min-width:0}
.hdr-title{font-size:1.1rem;font-weight:700;letter-spacing:.02em}
.hdr-sub{font-size:.75rem;color:var(--muted)}
.year-pills{display:flex;gap:6px;flex-wrap:wrap}
.year-pill{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:.8rem;cursor:pointer;transition:all .15s}
.year-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.year-pill:hover:not(.active){border-color:var(--blue);color:var(--text)}
.status-pills{display:flex;gap:8px;flex-wrap:wrap}
.status-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.status-pill .dot{width:7px;height:7px;border-radius:50%}
.sp-green{background:rgba(58,158,58,.15);color:#6ec96e}.sp-green .dot{background:var(--green)}
.sp-yellow{background:rgba(232,196,42,.15);color:#e8c42a}.sp-yellow .dot{background:var(--yellow)}
.sp-red{background:rgba(212,43,43,.15);color:#e05555}.sp-red .dot{background:var(--red)}
/* TABS */
nav.tabs{background:var(--header);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:2px;overflow-x:auto}
.tab-btn{background:none;border:none;color:var(--muted);padding:12px 16px;font-family:'IBM Plex Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn.active{color:var(--text);border-bottom-color:var(--blue)}
.tab-btn:hover:not(.active){color:var(--text)}
/* CONTENT */
.tab-content{display:none;padding:24px;flex:1}
.tab-content.active{display:block}
/* GRID & CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative}
.kpi-top-bar{height:4px}
.kpi-body{padding:16px}
.kpi-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:4px;margin-bottom:8px}
.kpi-value{font-family:'IBM Plex Mono',monospace;font-size:1.35rem;font-weight:600;line-height:1;margin-bottom:6px}
.kpi-sub{font-size:.72rem;color:var(--muted)}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:8px}
.badge-green{background:rgba(58,158,58,.2);color:#6ec96e}
.badge-yellow{background:rgba(232,196,42,.2);color:#e8c42a}
.badge-red{background:rgba(212,43,43,.2);color:#e05555}
.badge-blue{background:rgba(36,144,212,.2);color:#5bb8f0}
/* TOOLTIP */
.info-icon{cursor:help;font-size:.85rem;color:var(--muted);position:relative;display:inline-block}
.info-icon:hover .tooltip-text{display:block}
.tooltip-text{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#222;border:1px solid #3a3a3a;border-radius:8px;padding:10px 12px;width:260px;font-size:.75rem;color:var(--text);line-height:1.5;z-index:200;pointer-events:none;white-space:normal;font-family:'IBM Plex Sans',sans-serif;text-transform:none;letter-spacing:0}
/* CHARTS */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.chart-title{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.chart-sub{font-size:.75rem;color:var(--muted);margin-bottom:16px}
.chart-container{position:relative}
/* SEMAPHORE BARS */
.semaphore-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.sem-title{font-size:.85rem;font-weight:600;margin-bottom:16px}
.sem-item{margin-bottom:16px}
.sem-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sem-label{font-size:.8rem;color:var(--muted)}
.sem-value{font-family:'IBM Plex Mono',monospace;font-size:.9rem;font-weight:600}
.sem-bar-track{background:#2a2a2a;border-radius:4px;height:8px;position:relative;overflow:visible}
.sem-bar-fill{height:8px;border-radius:4px;transition:width .5s ease}
.sem-limit-line{position:absolute;top:-4px;height:16px;width:2px;transform:translateX(-50%)}
.sem-limits{display:flex;gap:16px;margin-top:6px;font-size:.7rem;color:var(--muted)}
/* 2-col grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
/* TABLE */
.table-wrap{overflow-x:auto}
table.data-table{width:100%;border-collapse:collapse;font-size:.78rem}
table.data-table th{background:var(--header);color:var(--muted);font-weight:600;padding:10px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;font-size:.7rem;letter-spacing:.05em;text-transform:uppercase}
table.data-table th:first-child{text-align:left}
table.data-table td{padding:9px 12px;text-align:right;border-bottom:1px solid #222;font-family:'IBM Plex Mono',monospace}
table.data-table td:first-child{text-align:left;font-family:'IBM Plex Sans',sans-serif;color:var(--text);font-weight:500;white-space:nowrap;max-width:220px}
table.data-table tr:hover td{background:rgba(255,255,255,.02)}
.cell-green{color:#6ec96e}
.cell-yellow{color:#e8c42a}
.cell-red{color:#e05555}
.cell-blue{color:#5bb8f0}
.cell-nd{color:#555}
.td-rel{position:relative}
.td-tip{display:none;position:absolute;bottom:calc(100% + 4px);right:0;background:#222;border:1px solid #3a3a3a;border-radius:8px;padding:10px 12px;width:260px;font-size:.73rem;color:var(--text);line-height:1.5;z-index:300;white-space:normal;font-family:'IBM Plex Sans',sans-serif;text-align:left}
.td-rel:hover .td-tip{display:block}
.ctx-dot{font-size:.65rem;color:var(--blue);margin-left:3px;vertical-align:top}
.export-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:border-color .15s;margin-bottom:16px}
.export-btn:hover{border-color:var(--blue);color:var(--blue)}
/* NOTE BOX */
.note-box{background:rgba(36,144,212,.08);border:1px solid rgba(36,144,212,.25);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;font-size:.8rem;color:#a0c8e8;line-height:1.6}
.note-box strong{color:var(--blue)}
/* SECTION LABEL */
.sec-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;margin-top:24px;font-weight:600}
.sec-label:first-child{margin-top:0}
</style>
</head>

/* =========================================================
   HELPERS
   ========================================================= */
function getIdx(year){ return ANOS.indexOf(year); }
function val(key,year){ const v=DATA[key][getIdx(year)]; return v; }
function allVals(key){ return ANOS.map((_,i)=>DATA[key][i]); }

function fmtBi(v, decimals=4){
  if(v===null||v===undefined) return 'N/D';
  const bi = v/1000;
  // Format integer part with thousand dots, decimal part with comma — no separator on decimal digits
  const abs = Math.abs(bi);
  const [intPart, decPart] = abs.toFixed(decimals).split('.');
  const intFmt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return (bi<0?'-':'')+'R$ '+intFmt+','+decPart+' bi';
}
function fmtMi(v, decimals=4){
  if(v===null||v===undefined) return 'N/D';
  const abs = Math.abs(v);
  const [intPart, decPart] = abs.toFixed(decimals).split('.');
  const intFmt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return (v<0?'-':'')+'R$ '+intFmt+','+decPart+' mi';
}
function fmtPct(v){
  if(v===null||v===undefined) return 'N/D';
  return v.toFixed(2).replace('.',',')+' %';
}
function fmtBiRaw(v){ if(v===null||v===undefined) return null; return v/1000; }
function fmtMiRaw(v){ if(v===null||v===undefined) return null; return v; }

function getColor(key, v, year){
  if(v===null) return 'var(--muted)';
  if(key==='pessoal_pct'){
    if(v>=49) return 'var(--red)';
    if(v>=46.55) return 'var(--yellow)';
    return 'var(--green)';
  }
  if(key==='art167a'){
    if(v===null) return 'var(--muted)';
    if(v>=95) return 'var(--red)';
    if(v>=90) return 'var(--yellow)';
    return 'var(--green)';
  }
  if(key==='saude_pct') return v>=12?'var(--green)':'var(--red)';
  if(key==='educ_pct') return v>=25?'var(--green)':'var(--red)';
  if(key==='res_prim_real') return v>0?'var(--green)':'var(--red)';
  if(key==='res_orc_ajustado'){
    if(v>0) return 'var(--green)';
    if(v>=-2000) return 'var(--yellow)';
    return 'var(--red)';
  }
  if(key==='deficit_prev') return 'var(--red)';
  if(key==='divida_saldo') return 'var(--blue)';
  return 'var(--text)';
}

function getBadge(key, v){
  if(v===null) return '';
  let cls='badge-blue', label='N/D';
  if(key==='pessoal_pct'){
    if(v>=49){cls='badge-red';label='⚠ Acima do limite'}
    else if(v>=46.55){cls='badge-yellow';label='△ Limite prudencial'}
    else{cls='badge-green';label='✓ Dentro do limite'}
  } else if(key==='art167a'){
    if(v===null){return '';}
    if(v>=95){cls='badge-red';label='⚠ Acima de 95%'}
    else if(v>=90){cls='badge-yellow';label='△ Zona de atenção'}
    else{cls='badge-green';label='✓ Dentro do limite'}
  } else if(key==='saude_pct'){
    cls=v>=12?'badge-green':'badge-red';
    label=v>=12?'✓ Mínimo cumprido':'⚠ Abaixo do mínimo';
  } else if(key==='educ_pct'){
    cls=v>=25?'badge-green':'badge-red';
    label=v>=25?'✓ Mínimo cumprido':'⚠ Abaixo do mínimo';
  } else if(key==='res_prim_real'){
    cls=v>0?'badge-green':'badge-red';
    label=v>0?'✓ Superávit':'⚠ Déficit';
  } else if(key==='res_orc_ajustado'){
    if(v>0){cls='badge-green';label='✓ Superávit ajustado';}
    else if(v>=-2000){cls='badge-yellow';label='△ Déficit moderado';}
    else{cls='badge-red';label='⚠ Déficit elevado';}
  } else { return ''; }
  return `<span class="kpi-badge ${cls}">${label}</span>`;
}

Chart.defaults.color = '#888';

Chart.defaults.plugins.tooltip.titleFont = {family:"'IBM Plex Mono',monospace", size:12};
Chart.defaults.plugins.tooltip.bodyFont = {family:"'IBM Plex Sans',sans-serif", size:12};

Chart.defaults.plugins.tooltip.backgroundColor = '#222';

function makeTooltip(key, isBi=false, isPct=false){
  return {
    callbacks:{
      label(ctx){
        const ano = ANOS[ctx.dataIndex];
        const v = ctx.parsed.y;
        let strVal;
        if(v===null||v===undefined) strVal='N/D';
        else if(isPct) strVal = v.toFixed(2).replace('.',',')+' %';
        else if(isBi){ const abs=Math.abs(v); const p=abs.toFixed(4).split('.'); const iF=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.'); strVal=(v<0?'−':'')+'R$ '+iF+','+p[1]+' bi'; }
        else{ const abs2=Math.abs(v); const p2=Math.round(abs2).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.'); strVal=(v<0?'−':'')+'R$ '+p2+' mi'; }
        const lines = [` ${ctx.dataset.label||''}: ${strVal}`];
        const ctx2 = CONTEXTO[key];
        if(ctx2 && ctx2[ano] && ctx2[ano].length>0){
          lines.push('');
          lines.push('📌 Fatores:');
          ctx2[ano].forEach(f=>lines.push('  • '+f));
        }
        return lines;
      }
    }
  }
}

const chartInstances = {};
function destroyChart(id){
  if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; }
}
function newChart(id, config){
  destroyChart(id);
  const c = document.getElementById(id);
  if(!c) return;
  chartInstances[id] = new Chart(c, config);
  return chartInstances[id];
}

  let primCls=prim>0?'sp-green':'sp-red';

function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');

  if(name==='visao') rebuildVisaoGeral();
  if(name==='resultados') buildResultados();

  if(name==='despesas') buildDespesas();

}

function buildSemaphore(y){
  const i=getIdx(y);
  const el=document.getElementById('semSection');
  if(!el) return;
  
  const items=[
    {key:'pessoal_pct',label:'Despesa de Pessoal / RCL',val:DATA.pessoal_pct[i],max:55,limits:[{at:46.55/55,color:'var(--yellow)',label:'Prudencial 46,55%'},{at:49/55,color:'var(--red)',label:'Limite 49%'}]},
    {key:'art167a',label:'Art. 167-A (DC/RC)',val:DATA.art167a[i],max:100,limits:[{at:90/100,color:'var(--yellow)',label:'Atenção 90%'},{at:95/100,color:'var(--red)',label:'Limite 95%'}]},
    {key:'saude_pct',label:'Saúde (ASPS / RLIT)',val:DATA.saude_pct[i],max:20,limits:[{at:12/20,color:'var(--green)',label:'Mínimo 12%'}]},
    {key:'educ_pct',label:'Educação (MDE / RLIT)',val:DATA.educ_pct[i],max:35,limits:[{at:25/35,color:'var(--green)',label:'Mínimo 25%'}]},
  ];
  
  el.innerHTML=items.map(it=>{
    if(it.val===null) return `<div class="sem-item"><div class="sem-header"><span class="sem-label">${it.label}</span><span class="sem-value cell-nd">N/D</span></div></div>`;
    const fillW=Math.min(100,Math.max(0,it.val/it.max*100));
    const color=getColor(it.key,it.val,y);
    const limLines=it.limits.map(l=>`<div class="sem-limit-line" style="left:${l.at*100}%;background:${l.color}"></div>`).join('');
    const limLabels=it.limits.map(l=>`<span>${l.label}</span>`).join('');
    return `
      <div class="sem-item">
        <div class="sem-header">
          <span class="sem-label">${it.label}</span>
          <span class="sem-value" style="color:${color}">${it.val.toFixed(2).replace('.',',')}%</span>
        </div>
        <div class="sem-bar-track">
          <div class="sem-bar-fill" style="width:${fillW}%;background:${color}"></div>
          ${limLines}
        </div>
        <div class="sem-limits">${limLabels}</div>
      </div>
    `;
  }).join('');
}

const ROWS = [
  {key:'res_prim_meta',   label:'Res. Primário — Meta',       fmt:'mi', limit:'LDO/LOA (variável)'},
  {key:'res_prim_real',   label:'Res. Primário — Realizado',  fmt:'mi', limit:'Meta LDO'},
  {key:'res_orc_normal',  label:'Res. Orçamentário Normal',   fmt:'mi', limit:'—'},

  {key:'art167a',         label:'Art. 167-A DC/RC (%)',        fmt:'pct', limit:'< 95%'},
  {key:'deficit_prev',    label:'Déficit Previdenciário',      fmt:'mi', limit:'IPE Prev — Fundo Fin.'},
  {key:'funrigs',         label:'FUNRIGS',                    fmt:'mi', limit:'Desde jun/2024'},
  {key:'icms',            label:'ICMS Nominal',               fmt:'mi', limit:'Principal imposto estadual'},
  {key:'desp_pessoal',    label:'Desp. Pessoal',              fmt:'mi', limit:'Pessoal/RCL ≤ 49%'},
  {key:'desp_odc',        label:'Outras Desp. Correntes',     fmt:'mi', limit:'Custeio total'},
  {key:'desp_invest',     label:'Investimentos',              fmt:'mi', limit:'—'},
  {key:'saude_pct',       label:'Saúde ASPS (%)',             fmt:'pct', limit:'≥ 12% RLIT'},
  {key:'educ_pct',        label:'Educação MDE (%)',           fmt:'pct', limit:'≥ 25% RLIT'},
  {key:'divida_saldo',    label:'Estoque Dívida União',       fmt:'bi',  limit:'DCL ≤ 200% RCL'},
  {key:'pag_divida',      label:'Pagamento Dívida União',     fmt:'mi',  limit:'RRF / LC 206/2024'},
];

function cellClass(key, v){
  if(v===null) return 'cell-nd';
  const c=getColor(key,v,0);
  if(c==='var(--green)') return 'cell-green';
  if(c==='var(--yellow)') return 'cell-yellow';
  if(c==='var(--red)') return 'cell-red';
  if(c==='var(--blue)') return 'cell-blue';
  return '';
}

function fmtBiStr(v, decimals=4){
  const abs = Math.abs(v);
  const parts = abs.toFixed(decimals).split('.');
  const intFmt = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return (v<0?'−':'')+'R$ '+intFmt+','+parts[1]+' bi';
}
function cellFmt(key, v, fmt){
  if(v===null) return '<span class="cell-nd">N/D</span>';
  if(fmt==='pct') return v.toFixed(2).replace('.',',')+'%';
  if(fmt==='bi') return fmtBiStr(v);
  return fmtBiStr(v/1000);
}

function varPct(key, fmt){
  const v24=DATA[key][getIdx(2024)];
  const v25=DATA[key][getIdx(2025)];
  if(v24===null||v25===null||v24===0) return '<span class="cell-nd">N/D</span>';
  const pct=((v25-v24)/Math.abs(v24))*100;
  const cls=pct>=0?'cell-green':'cell-red';
  const sign=pct>=0?'+':'';
  return `<span class="${cls}">${sign}${pct.toFixed(1).replace('.',',')}%</span>`;
}

function buildTabela(){
  const el=document.getElementById('tab-tabela');
  
  const thYears = ANOS.map(y=>`<th>${y}</th>`).join('');
  const rows = ROWS.map(row=>{
    const cells = ANOS.map((y,i)=>{
      const v=DATA[row.key][i];
      const cls=cellClass(row.key,v);
      const fv=cellFmt(row.key,v,row.fmt);
      const ctx=CONTEXTO[row.key];
      const hasCtx=ctx&&ctx[y]&&ctx[y].length>0;
      const tipHtml=hasCtx?`<span class="ctx-dot" title="">ⓘ</span><span class="td-tip">${ctx[y].map(f=>'• '+f).join('<br>')}</span>`:'';
      return `<td class="td-rel ${cls}">${fv}${tipHtml}</td>`;
    }).join('');
    return `<tr><td>${row.label}</td>${cells}<td>${varPct(row.key,row.fmt)}</td><td style="color:var(--muted);font-family:'IBM Plex Sans',sans-serif;font-size:.75rem">${row.limit}</td></tr>`;
  }).join('');
  
  el.innerHTML=`
    <button class="export-btn" onclick="exportCsv()">⬇ Exportar CSV</button>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Indicador</th>${thYears}<th>Var. 24→25</th><th>Limite / Referência</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function exportCsv(){
  const headers=['Indicador',...ANOS.map(String),'Var 2024-2025','Limite'].join(';');
  const rows=ROWS.map(row=>{
    const vals=ANOS.map((_,i)=>{
      const v=DATA[row.key][i];
      if(v===null) return 'N/D';
      if(row.fmt==='pct') return v.toFixed(2).replace('.',',');
      if(row.fmt==='bi') return v.toFixed(4).replace('.',',');
      return (v/1000).toFixed(4).replace('.',',');
    });
    const v24=DATA[row.key][getIdx(2024)];
    const v25=DATA[row.key][getIdx(2025)];
    let varStr='N/D';
    if(v24!==null&&v25!==null&&v24!==0){
      varStr=((((v25-v24)/Math.abs(v24))*100)).toFixed(1).replace('.',',')+' %';
    }
    return [row.label,...vals,varStr,row.limit].join(';');
  });
  const csv=[headers,...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='painel-fiscal-rs-2019-2025.csv';
  a.click();
}
